<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Mission Game Shell</title>
    <style>
        :root {
            --bg: #060b16;
            --panel: #0f172a;
            --accent: #f59e0b;
            --text: #f8fafc;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        .shell {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            position: relative;
            overflow: hidden;
        }

        #gameFrame {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: #000;
        }

        #rotateOverlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 20;
            background: radial-gradient(circle at 20% 10%, rgba(245, 158, 11, 0.2), transparent 50%), var(--bg);
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }

        #rotateOverlay .box {
            max-width: 420px;
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(245, 158, 11, 0.5);
            border-radius: 14px;
            padding: 20px 18px;
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.45);
        }

        #rotateOverlay h2 {
            margin: 0 0 10px;
            color: var(--accent);
            font-size: clamp(26px, 7vw, 40px);
        }

        #rotateOverlay p {
            margin: 0;
            font-size: clamp(15px, 4.2vw, 20px);
            color: #fcd34d;
            line-height: 1.35;
            font-weight: 700;
        }

        #tapHint {
            margin-top: 10px;
            color: #fde68a;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        @media screen and (max-width: 1024px) and (orientation: portrait) {
            #rotateOverlay {
                display: flex;
            }

            #gameFrame {
                visibility: hidden;
            }
        }
    </style>
</head>
<body>
    <div class="shell" id="shellRoot">
        <iframe id="gameFrame" title="Mission Game"></iframe>
    </div>

    <div id="rotateOverlay">
        <div class="box">
            <h2>Rotate Phone</h2>
            <p>This game runs in landscape mode only. Rotate your phone and tap the screen.</p>
            <div id="tapHint">Tap anywhere for fullscreen</div>
        </div>
    </div>

    <script>
        const routes = {
            home: 'home.html',
            level1: 'level1.html',
            level2: 'level2.html'
        };

        const frame = document.getElementById('gameFrame');

        function resolvePageFromQuery() {
            const params = new URLSearchParams(window.location.search);
            const page = params.get('page');
            if (page && routes[page]) return page;
            return 'home';
        }

        function navigate(pageKey, pushHistory = true) {
            if (!routes[pageKey]) pageKey = 'home';
            const target = routes[pageKey];
            if (!frame.src || !frame.src.endsWith('/' + target)) {
                frame.src = target;
            }
            if (pushHistory) {
                const url = pageKey === 'home' ? 'index.html' : `index.html?page=${encodeURIComponent(pageKey)}`;
                history.replaceState({ page: pageKey }, '', url);
            }
        }

        function isFullscreenActive() {
            return Boolean(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
        }

        async function requestFullscreenAndLandscape() {
            if (!isFullscreenActive()) {
                const root = document.documentElement;
                try {
                    if (root.requestFullscreen) {
                        await root.requestFullscreen();
                    } else if (root.webkitRequestFullscreen) {
                        root.webkitRequestFullscreen();
                    } else if (root.msRequestFullscreen) {
                        root.msRequestFullscreen();
                    }
                } catch (_) {
                    return;
                }
            }

            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }
        }

        window.addEventListener('message', (event) => {
            const data = event.data;
            if (!data || typeof data !== 'object') return;

            if (data.type === 'missiongame:navigate') {
                navigate(data.page || 'home');
            }

            if (data.type === 'missiongame:request-fullscreen') {
                requestFullscreenAndLandscape();
            }
        });

        window.addEventListener('pointerdown', requestFullscreenAndLandscape, { passive: true });

        navigate(resolvePageFromQuery(), false);
    </script>
</body>
</html>
